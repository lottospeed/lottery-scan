<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ LOTTO X - 極速秒對系統 ⚡</title>
    <!-- 引入開源 QR Code 掃描庫 -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* 深色科技感背景 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at center, #0a1128 0%, #020617 100%);
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
        }

        .subtitle {
            font-size: 12px;
            color: #94a3b8;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        /* 掃描器外框容器 */
        .scanner-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            padding: 4px;
            background: linear-gradient(135deg, #fbbf24 0%, #1e293b 40%, #0f172a 100%);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(245, 158, 11, 0.15);
            overflow: hidden;
        }

        #reader {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            border: none !important;
            background: #020617;
        }

        /* 覆寫掃描套件內部醜陋的按鈕樣式 */
        #reader button {
            background: linear-gradient(90deg, #fbbf24, #f59e0b) !important;
            color: #020617 !important;
            border: none !important;
            padding: 12px 24px !important;
            font-weight: bold !important;
            border-radius: 12px !important;
            cursor: pointer !important;
            margin: 15px auto !important;
            box-shadow: 0 4px 14px rgba(245, 158, 11, 0.4) !important;
            transition: all 0.2s;
        }
        #reader button:hover { transform: scale(1.05); }

        /* 毛玻璃質感對獎結果卡片 */
        .result-card {
            margin-top: 25px;
            width: 100%;
            max-width: 400px;
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .result-card h3 {
            margin: 0 0 15px 0;
            font-size: 16px;
            color: #94a3b8;
            letter-spacing: 1px;
        }

        .status-idle {
            color: #38bdf8;
            font-size: 15px;
            animation: pulse 2s infinite;
        }

        .status-success {
            color: #4ade80;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
        }

        .raw-data {
            background: rgba(15, 23, 42, 0.6);
            padding: 12px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 13px;
            color: #cbd5e1;
            word-break: break-all;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 15px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>LOTTO X</h1>
    <div class="subtitle">Quantum Scan System</div>
    
    <!-- 奢華科技風掃描外框 -->
    <div class="scanner-container">
        <div id="reader"></div>
    </div>

    <!-- 毛玻璃結果卡片 -->
    <div class="result-card">
        <h3>AI LIVE REALTIME DETECT</h3>
        <div id="result-status" class="status-idle">📡 正在等待彩券條碼進入瞄準區域...</div>
        <div id="result-details"></div>
    </div>

    <script>
        function onScanSuccess(decodedText, decodedResult) {
            playBeep();
            
            // 變更為成功狀態與光暈
            document.getElementById('result-status').className = "status-success";
            document.getElementById('result-status').innerHTML = "⚡ 掃描成功 ⚡";
            
            // 顯示掃出來的資料
            document.getElementById('result-details').innerHTML = `
                <div class="raw-data">
                    <strong>條碼資訊：</strong><br>${decodedText}
                </div>
                <p style="color: #fbbf24; font-size: 14px; margin-top: 15px;">
                    [核心邏輯對接處] 系統已獲取資料，準備秒速比對中獎號碼...
                </p>
            `;
        }

        function onScanFailure(error) {
            // 靜默處理，不打擾使用者對焦
        }

        // 科技感短音效
        function playBeep() {
            let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let oscillator = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(1200, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.08);
        }

        // 啟動相機 (設定掃描框大小與每秒偵測偵數)
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 30, qrbox: { width: 250, height: 250 } }
        );
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
